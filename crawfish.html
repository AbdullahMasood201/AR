<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crawfish AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    model-viewer {
      width: 100%;
      height: 65vh;
    }

    .btn-ar {
      display: inline-block;
      margin: 15px;
      padding: 15px 25px;
      background: #ff3c3c;
      color: white;
      font-size: 18px;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
    }

    .back {
      display: block;
      margin-top: 10px;
      color: red;
      text-decoration: none;
    }
  </style>

</head>

<body>

<div id="loader">Preparing AR...</div>

<h1>🦞 Crawfish</h1>

<model-viewer 
  id="model"
  src="model.glb"
  ios-src="model.usdz"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate>
</model-viewer>

<!-- BIG AR BUTTON -->
<button class="btn-ar" onclick="openAR()">🚀 View in AR</button>

<a href="index.html" class="back">← Back</a>

<script>
  window.onload = () => {
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
    }, 800);
  };

  function openAR() {
    document.getElementById("model").activateAR();
  }
</script>

</body>
</html>
