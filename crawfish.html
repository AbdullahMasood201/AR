<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crawfish AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    h1 {
      margin: 10px;
    }

    model-viewer {
      width: 100%;
      height: 75vh;
    }

    .back {
      display: inline-block;
      margin: 10px;
      color: red;
      text-decoration: none;
    }
  </style>

  <script>
    window.onload = () => {
      setTimeout(() => {
        document.getElementById("loader").style.display = "none";
      }, 1000);
    };
  </script>

</head>

<body>

<div id="loader">Preparing AR Experience...</div>

<a href="index.html" class="back">← Back</a>

<h1>🦞 Crawfish</h1>

<model-viewer 
  src="model.glb"
  ios-src="model.usdz"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1">
</model-viewer>

<p>Tap the AR button to place it in your space</p>

</body>
</html>
