<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 999;
    }

    h1 {
      padding: 20px;
      font-size: 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: linear-gradient(145deg, #111, #1a1a1a);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255,0,0,0.2);
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      background: #ff3c3c;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>

  <script>
    window.onload = () => {
      setTimeout(() => {
        document.getElementById("loader").style.display = "none";
      }, 800);
    };
  </script>

</head>

<body>

<div id="loader">Loading AR Menu...</div>

<h1>🍽️ Experience Our Products in AR</h1>

<div class="container">

  <div class="card">
    <h2>🦞 Crawfish</h2>
    <p>View this product in real-world AR</p>
    <a href="crawfish.html" class="btn">View in AR</a>
  </div>

  <div class="card">
    <h2>🍔 Burger</h2>
    <p>Coming soon in AR</p>
    <a href="burger.html" class="btn">Coming Soon</a>
  </div>

  <div class="card">
    <h2>🍕 Pizza</h2>
    <p>Coming soon in AR</p>
    <a href="pizza.html" class="btn">Coming Soon</a>
  </div>

</div>

</body>
</html>
