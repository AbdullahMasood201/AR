<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; }
    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: #f0f0f0;
    }
  </style>
</head>

<body>

<model-viewer 
  src="./model.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  exposure="1"
  shadow-intensity="1"
  environment-image="neutral"
  camera-orbit="0deg 75deg 2m"
>
</model-viewer>

</body>
</html>
