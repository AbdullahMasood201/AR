<!DOCTYPE html>
<html>
<head>
  <title>Crawfish AR</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .card {
      margin: 40px;
      padding: 30px;
      background: #111;
      border-radius: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #ff3c3c;
      color: white;
      font-size: 18px;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>

  <script>
    window.onload = () => {
      setTimeout(() => {
        document.getElementById("loader").style.display = "none";
      }, 800);
    };
  </script>

</head>

<body>

<div id="loader">Loading AR Experience...</div>

<div class="card">
  <h1>🦞 Crawfish</h1>
  <p>View this product in real-world AR</p>
  <a href="crawfish.html" class="btn">View in AR</a>
</div>

</body>
</html>
