<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Experience</title>

  <script>
    function openAR() {

      var userAgent = navigator.userAgent || navigator.vendor;

      // ✅ ANDROID → Scene Viewer (Direct AR)
      if (/android/i.test(userAgent)) {

        const modelUrl = "https://raw.githubusercontent.com/AbdullahMasood201/AR/main/model.glb";

        const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${modelUrl}&mode=ar_only&resizable=true#Intent;scheme=https;package=com.google.ar.core;end;`;

        window.location.href = intent;
      }

      // ✅ iPHONE → Quick Look (Direct AR)
      else if (/iPhone|iPad/i.test(userAgent)) {

        const usdzUrl = "https://raw.githubusercontent.com/AbdullahMasood201/AR/main/model.usdc";

        window.location.href = usdzUrl;
      }

      // 💻 Desktop fallback
      else {
        document.body.innerHTML = "<h2>📱 Open this link on mobile to view in AR</h2>";
      }
    }
  </script>
</head>

<body onload="openAR()" style="margin:0;">
</body>
</html>
