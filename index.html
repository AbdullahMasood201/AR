<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crawfish AR Experience</title>

  <!-- Model Viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 15px;
      font-size: 24px;
    }

    model-viewer {
      width: 100%;
      height: 80vh;
      background: #111;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 12px 20px;
      background: #ff4d4d;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>🦞 Crawfish - View in AR</h1>

  <model-viewer 
    src="model.glb"
    ios-src="model.usdz"
    alt="Crawfish 3D Model"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    style="--poster-color: transparent;">
  </model-viewer>

  <p>Tap the AR button to place the product in your space</p>

</body>
</html>
