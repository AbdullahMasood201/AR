<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Model with Gestures</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <!-- Gesture Detector -->
  <script src="https://unpkg.com/aframe-gesture-detector/dist/aframe-gesture-detector.min.js"></script>

  <!-- Gesture Handler Component -->
  <script>
    AFRAME.registerComponent('gesture-handler', {
      schema: {
        rotationFactor: { default: 5 },
        scaleFactor: { default: 0.01 },
        minScale: { default: 0.3 },
        maxScale: { default: 3 }
      },

      init: function () {
        this.handleScale = this.handleScale.bind(this);
        this.handleRotation = this.handleRotation.bind(this);

        this.el.sceneEl.addEventListener('onefingermove', this.handleRotation);
        this.el.sceneEl.addEventListener('twofingermove', this.handleScale);
      },

      handleRotation: function (event) {
        let rotation = this.el.getAttribute('rotation');
        rotation.y += event.detail.positionChange.x * this.data.rotationFactor;
        this.el.setAttribute('rotation', rotation);
      },

      handleScale: function (event) {
        let scale = this.el.getAttribute('scale');
        let newScale = scale.x + event.detail.spreadChange * this.data.scaleFactor;

        newScale = Math.min(Math.max(newScale, this.data.minScale), this.data.maxScale);

        this.el.setAttribute('scale', {
          x: newScale,
          y: newScale,
          z: newScale
        });
      }
    });
  </script>

</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene
    embedded
    arjs="sourceType: webcam; trackingMethod: best;"
    gesture-detector
  >

    <!-- Marker -->
    <a-marker preset="hiro">

      <!-- 🔁 REPLACE YOUR MODEL LINK BELOW -->
      <a-entity
        gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Duck/glTF-Binary/Duck.glb"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        gesture-handler
      >
      </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
